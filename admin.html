<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Painel ADM - Rebenhaus</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Jost', sans-serif;
    background: #f5f5f5;
    color: #333;
    padding: 20px;
  }
  .container { max-width: 1400px; margin: 0 auto; }
  header {
    background: #0e0c0a;
    color: #f7f3ec;
    padding: 20px;
    border-radius: 8px;
    margin-bottom: 30px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  header h1 { font-size: 28px; }
  .btn-logout {
    background: #b8913a;
    color: white;
    border: none;
    padding: 10px 20px;
    border-radius: 4px;
    cursor: pointer;
    font-weight: 500;
  }
  .btn-logout:hover { background: #a07c2f; }

  .controls {
    background: white;
    padding: 20px;
    border-radius: 8px;
    margin-bottom: 30px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.1);
  }
  .controls h2 { margin-bottom: 20px; color: #0e0c0a; }
  .form-group {
    margin-bottom: 15px;
  }
  label {
    display: block;
    margin-bottom: 5px;
    font-weight: 500;
    color: #333;
  }
  input, textarea, select {
    width: 100%;
    padding: 10px;
    border: 1px solid #ddd;
    border-radius: 4px;
    font-family: inherit;
    font-size: 14px;
  }
  input:focus, textarea:focus, select:focus {
    outline: none;
    border-color: #b8913a;
    box-shadow: 0 0 8px rgba(184,145,58,0.2);
  }
  textarea {
    resize: vertical;
    min-height: 80px;
  }
  .form-row {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 15px;
  }
  @media (max-width: 768px) {
    .form-row { grid-template-columns: 1fr; }
  }
  .button-group {
    display: flex;
    gap: 10px;
    margin-bottom: 20px;
  }
  .btn {
    padding: 12px 24px;
    border: none;
    border-radius: 4px;
    cursor: pointer;
    font-weight: 500;
    transition: all 0.3s;
  }
  .btn-primary {
    background: #b8913a;
    color: white;
  }
  .btn-primary:hover { background: #a07c2f; }
  .btn-secondary {
    background: #ddd;
    color: #333;
  }
  .btn-secondary:hover { background: #ccc; }
  .btn-danger {
    background: #d9534f;
    color: white;
  }
  .btn-danger:hover { background: #c9302c; }
  .btn-success {
    background: #5cb85c;
    color: white;
  }
  .btn-success:hover { background: #449d44; }

  .products-table {
    background: white;
    border-radius: 8px;
    overflow: hidden;
    box-shadow: 0 2px 8px rgba(0,0,0,0.1);
  }
  table {
    width: 100%;
    border-collapse: collapse;
  }
  th {
    background: #0e0c0a;
    color: #f7f3ec;
    padding: 15px;
    text-align: left;
    font-weight: 600;
    border-bottom: 2px solid #b8913a;
  }
  td {
    padding: 15px;
    border-bottom: 1px solid #eee;
  }
  tr:hover { background: #f9f9f9; }
  .actions {
    display: flex;
    gap: 8px;
  }
  .btn-sm {
    padding: 6px 12px;
    font-size: 12px;
    border: none;
    border-radius: 4px;
    cursor: pointer;
    transition: all 0.3s;
  }
  .btn-edit {
    background: #5cb85c;
    color: white;
  }
  .btn-edit:hover { background: #449d44; }
  .btn-del {
    background: #d9534f;
    color: white;
  }
  .btn-del:hover { background: #c9302c; }

  .message {
    padding: 15px;
    border-radius: 4px;
    margin-bottom: 20px;
    display: none;
  }
  .message.success {
    background: #dff0d8;
    color: #3c763d;
    border: 1px solid #d6e9c6;
    display: block;
  }
  .message.error {
    background: #f2dede;
    color: #a94442;
    border: 1px solid #ebccd1;
    display: block;
  }

  .empty-state {
    text-align: center;
    padding: 60px 20px;
    color: #999;
  }
  .empty-state p { font-size: 18px; margin-bottom: 20px; }
</style>
</head>
<body>

<div class="container">
  <header>
    <h1>🍷 Painel ADM - Rebenhaus</h1>
    <button class="btn-logout" onclick="window.location.href='index.html'">Voltar ao site</button>
  </header>

  <div id="message" class="message"></div>

  <div class="controls">
    <h2>Gerenciar Produtos</h2>
    
    <div class="button-group">
      <button class="btn btn-primary" onclick="showAddForm()">+ Novo Produto</button>
      <button class="btn btn-secondary" onclick="exportProducts()">Exportar JSON</button>
      <button class="btn btn-secondary" onclick="resetProducts()">Restaurar Padrão</button>
    </div>

    <div id="formContainer" style="display: none; background: #f9f9f9; padding: 20px; border-radius: 4px; margin-bottom: 20px;">
      <h3 id="formTitle">Novo Produto</h3>
      <form id="productForm" onsubmit="saveProduct(event)">
        <input type="hidden" id="productId">
        
        <div class="form-row">
          <div class="form-group">
            <label for="nome">Nome do Vinho *</label>
            <input type="text" id="nome" required>
          </div>
          <div class="form-group">
            <label for="regiao">Região *</label>
            <input type="text" id="regiao" required placeholder="Ex: Nahe · Branco · Seco">
          </div>
          <div class="form-group">
            <label for="preco">Preço (R$) *</label>
            <input type="number" id="preco" step="0.01" required placeholder="124.90">
          </div>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label for="precoPix">Preço Pix (R$) *</label>
            <input type="number" id="precoPix" step="0.01" required placeholder="121.15">
          </div>
          <div class="form-group">
            <label for="tipo">Tipo *</label>
            <select id="tipo" required>
              <option value="">Selecione...</option>
              <option value="Branco">Branco</option>
              <option value="Tinto">Tinto</option>
              <option value="Rosé">Rosé</option>
              <option value="Espumante">Espumante</option>
            </select>
          </div>
          <div class="form-group">
            <label for="badge">Badge *</label>
            <input type="text" id="badge" required placeholder="Ex: Mais popular">
          </div>
        </div>

        <div class="form-group">
          <label for="descricao">Descrição (Notas de Sabor) *</label>
          <textarea id="descricao" required placeholder="Ex: Notas cítricas vibrantes, mineralidade elegante e final refrescante."></textarea>
        </div>

        <div class="form-group">
          <label for="harmoniza">Harmoniza com * (separado por ·)</label>
          <input type="text" id="harmoniza" required placeholder="Ex: Frutos do mar · Sushi · Peixe grelhado">
        </div>

        <div class="button-group">
          <button type="submit" class="btn btn-success">Salvar Produto</button>
          <button type="button" class="btn btn-secondary" onclick="hideAddForm()">Cancelar</button>
        </div>
      </form>
    </div>

    <h3 style="margin-top: 30px; margin-bottom: 20px;">Lista de Produtos</h3>
    <div id="productsList" class="products-table"></div>
  </div>
</div>

<script>
const STORAGE_KEY = 'rebenhaus_products';

// Produtos padrão
const defaultProducts = [
  {
    id: 1,
    nome: "St. Michael Riesling Nahe 2023",
    regiao: "Nahe · Branco · Suave",
    preco: 124.90,
    precoPix: 121.15,
    descricao: "Notas cítricas vibrantes, mineralidade elegante e final refrescante.",
    harmoniza: "Frutos do mar · Sushi · Peixe grelhado",
    badge: "Mais popular",
    tipo: "Branco"
  },
  {
    id: 2,
    nome: "Villa Wolf Pinot Noir Pfalz 2024",
    regiao: "Pfalz · Tinto · Seco",
    preco: 147.30,
    precoPix: 142.88,
    descricao: "Cereja fresca, framboesa e especiarias sutis. Taninos sedosos e corpo médio.",
    harmoniza: "Churrasco · Pato · Queijos macios",
    badge: "Tinto elegante",
    tipo: "Tinto"
  },
  {
    id: 3,
    nome: "St. Michael Pinot Blanc Nahe 2021",
    regiao: "Nahe · Branco · Semi-seco",
    preco: 115.90,
    precoPix: 112.42,
    descricao: "Floral e elegante, com frescor perfeito para o clima tropical.",
    harmoniza: "Moqueca · Camarão · Saladas",
    badge: "Curadoria",
    tipo: "Branco"
  },
  {
    id: 4,
    nome: "Villa Wolf Gewürztraminer 2024",
    regiao: "Pfalz · Branco · Semi-seco",
    preco: 159.90,
    precoPix: 155.10,
    descricao: "Aromático, lichia e rosa — um vinho que seduz antes mesmo do primeiro gole.",
    harmoniza: "Culinária asiática · Especiarias · Sobremesas",
    badge: "5% OFF",
    tipo: "Branco"
  }
];

// Carregar produtos
function loadProducts() {
  const stored = localStorage.getItem(STORAGE_KEY);
  return stored ? JSON.parse(stored) : defaultProducts;
}

// Salvar produtos
function saveProducts(products) {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(products));
  renderProducts();
  showMessage('Produtos salvos com sucesso!', 'success');
}

// Mostrar formulário
function showAddForm() {
  document.getElementById('formContainer').style.display = 'block';
  document.getElementById('productForm').reset();
  document.getElementById('productId').value = '';
  document.getElementById('formTitle').textContent = 'Novo Produto';
}

// Ocultar formulário
function hideAddForm() {
  document.getElementById('formContainer').style.display = 'none';
  document.getElementById('productForm').reset();
}

// Salvar produto
function saveProduct(e) {
  e.preventDefault();
  const products = loadProducts();
  const id = document.getElementById('productId').value;
  
  const product = {
    id: id ? parseInt(id) : Math.max(...products.map(p => p.id), 0) + 1,
    nome: document.getElementById('nome').value,
    regiao: document.getElementById('regiao').value,
    preco: parseFloat(document.getElementById('preco').value),
    precoPix: parseFloat(document.getElementById('precoPix').value),
    descricao: document.getElementById('descricao').value,
    harmoniza: document.getElementById('harmoniza').value,
    badge: document.getElementById('badge').value,
    tipo: document.getElementById('tipo').value
  };

  if (id) {
    const idx = products.findIndex(p => p.id === parseInt(id));
    products[idx] = product;
  } else {
    products.push(product);
  }

  saveProducts(products);
  hideAddForm();
}

// Editar produto
function editProduct(id) {
  const products = loadProducts();
  const product = products.find(p => p.id === id);
  
  document.getElementById('productId').value = product.id;
  document.getElementById('nome').value = product.nome;
  document.getElementById('regiao').value = product.regiao;
  document.getElementById('preco').value = product.preco;
  document.getElementById('precoPix').value = product.precoPix;
  document.getElementById('descricao').value = product.descricao;
  document.getElementById('harmoniza').value = product.harmoniza;
  document.getElementById('badge').value = product.badge;
  document.getElementById('tipo').value = product.tipo;
  document.getElementById('formTitle').textContent = 'Editar Produto';
  document.getElementById('formContainer').style.display = 'block';
  window.scrollTo(0, 0);
}

// Deletar produto
function deleteProduct(id) {
  if (confirm('Tem certeza que deseja deletar este produto?')) {
    let products = loadProducts();
    products = products.filter(p => p.id !== id);
    saveProducts(products);
  }
}

// Renderizar lista de produtos
function renderProducts() {
  const products = loadProducts();
  const container = document.getElementById('productsList');
  
  if (products.length === 0) {
    container.innerHTML = '<div class="empty-state"><p>Nenhum produto cadastrado.</p></div>';
    return;
  }

  let html = '<table><thead><tr><th>Nome</th><th>Região</th><th>Preço</th><th>Tipo</th><th>Badge</th><th>Ações</th></tr></thead><tbody>';
  
  products.forEach(p => {
    html += `
      <tr>
        <td>${p.nome}</td>
        <td>${p.regiao}</td>
        <td>R$ ${p.preco.toFixed(2)}</td>
        <td>${p.tipo}</td>
        <td>${p.badge}</td>
        <td class="actions">
          <button class="btn-sm btn-edit" onclick="editProduct(${p.id})">Editar</button>
          <button class="btn-sm btn-del" onclick="deleteProduct(${p.id})">Deletar</button>
        </td>
      </tr>
    `;
  });
  
  html += '</tbody></table>';
  container.innerHTML = html;
}

// Exportar como JSON
function exportProducts() {
  const products = loadProducts();
  const dataStr = JSON.stringify(products, null, 2);
  const dataBlob = new Blob([dataStr], { type: 'application/json' });
  const url = URL.createObjectURL(dataBlob);
  const link = document.createElement('a');
  link.href = url;
  link.download = 'rebenhaus-produtos.json';
  link.click();
}

// Restaurar padrão
function resetProducts() {
  if (confirm('Isso vai sobrescrever todos os produtos com os valores padrão. Continuar?')) {
    localStorage.removeItem(STORAGE_KEY);
    renderProducts();
    showMessage('Produtos restaurados ao padrão!', 'success');
  }
}

// Mostrar mensagem
function showMessage(text, type) {
  const msgEl = document.getElementById('message');
  msgEl.textContent = text;
  msgEl.className = 'message ' + type;
  setTimeout(() => {
    msgEl.className = 'message';
  }, 3000);
}

// Inicializar
renderProducts();
</script>

</body>
</html>
